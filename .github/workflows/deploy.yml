name: Deploy to cPanel - Assets

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            set -e
            
            echo "=== Starting deployment ==="
            
            # ========== GIT PULL ==========
            cd /home/dxtrmfwa/repositories/inventory-app
            git pull origin main --quiet
            echo "✅ Git pulled successfully"
            
            # ========== BUILD BACKEND (si TypeScript) ==========
            # Décommenter si le backend a un build step (tsc)
            # cd /home/dxtrmfwa/repositories/inventory-app/server
            # npm ci --quiet
            # npm run build
            # cd ..
            
            # ========== BACKEND DEPLOYMENT (CommonJS) ==========
            echo "📦 Deploying backend..."
            cp app.js /home/dxtrmfwa/public_html/assets.mfwa.org/app.js
            cp cron-auto-close.js /home/dxtrmfwa/public_html/assets.mfwa.org/cron-auto-close.js
            cp -r routes /home/dxtrmfwa/public_html/assets.mfwa.org/routes
            cp -r services /home/dxtrmfwa/public_html/assets.mfwa.org/services
            cp package.json /home/dxtrmfwa/public_html/assets.mfwa.org/package.json
            
            # Installer les dépendances backend en prod
            cd /home/dxtrmfwa/public_html/assets.mfwa.org
            npm ci --omit=dev --quiet
            
            # Recharger le process PM2
            pm2 restart assets-mgt --silent
            echo "✅ Backend deployed and PM2 restarted"
            
            # ========== FRONTEND BUILD & DEPLOYMENT ==========
            echo "🎨 Building and deploying frontend..."
            cd /home/dxtrmfwa/repositories/inventory-app/client
            npm ci --quiet
            npm run build --quiet
            
            # Copier le dist vers public_html/public
            rm -rf /home/dxtrmfwa/public_html/assets.mfwa.org/public
            cp -r dist /home/dxtrmfwa/public_html/assets.mfwa.org/public
            echo "✅ Frontend built and deployed"
            
            # ========== FINAL VALIDATION ==========
            echo "🔍 Validating deployment..."
            [ -f /home/dxtrmfwa/public_html/assets.mfwa.org/app.js ] && echo "✅ Backend entry point exists"
            [ -f /home/dxtrmfwa/public_html/assets.mfwa.org/package.json ] && echo "✅ package.json exists"
            [ -d /home/dxtrmfwa/public_html/assets.mfwa.org/public ] && echo "✅ Frontend build exists"
            
            echo "=== ✨ Deployment complete ==="