name: 🚀 Complete Deploy - Assets Management

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  VITE_CLOUDINARY_CLOUD_NAME: ${{ secrets.VITE_CLOUDINARY_CLOUD_NAME }}
  VITE_CLOUDINARY_UPLOAD_PRESET: ${{ secrets.VITE_CLOUDINARY_UPLOAD_PRESET }}
  VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout code
        uses: actions/checkout@v5

      - name: Deploy to cPanel
        id: deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          timeout: 600s
          command_timeout: 600s
          envs: VITE_GOOGLE_CLIENT_ID,VITE_CLOUDINARY_CLOUD_NAME,VITE_CLOUDINARY_UPLOAD_PRESET
          script: |
            set -e
            echo "=== Starting deployment ==="

            REPO_PATH="/home/${{ secrets.SSH_USER }}/repositories/inventory-app"
            PROD_PATH="/home/${{ secrets.SSH_USER }}/public_html/assets.mfwa.org"
            BACKUP_PATH="/home/${{ secrets.SSH_USER }}/backups/assets-mfwa-$(date +%Y%m%d-%H%M%S)"

            echo "📦 Creating backup..."
            mkdir -p "$(dirname "$BACKUP_PATH")"
            cp -r "$PROD_PATH" "$BACKUP_PATH" 2>/dev/null || true
            echo "✅ Backup created"

            echo "📥 Pulling latest code..."
            cd "$REPO_PATH"
            git fetch origin main --quiet
            git reset --hard origin/main --quiet
            COMMIT_HASH=$(git rev-parse --short HEAD)
            echo "✅ Git pulled (commit: $COMMIT_HASH)"

            echo "🎨 Building frontend..."
            cd "$REPO_PATH/client"
            npm ci --quiet
            npm run build --quiet
            echo "✅ Frontend built"

            echo "🔧 Injecting environment variables..."
            cat > /tmp/inject-env.js << 'INJECT_EOF'
            const fs = require('fs');
            const distIndexPath = '/home/${{ secrets.SSH_USER }}/repositories/inventory-app/client/dist/index.html';
            if (!fs.existsSync(distIndexPath)) { console.error('dist/index.html not found'); process.exit(1); }
            const envVars = {
              VITE_GOOGLE_CLIENT_ID: process.env.VITE_GOOGLE_CLIENT_ID || '',
              VITE_CLOUDINARY_CLOUD_NAME: process.env.VITE_CLOUDINARY_CLOUD_NAME || '',
              VITE_CLOUDINARY_UPLOAD_PRESET: process.env.VITE_CLOUDINARY_UPLOAD_PRESET || '',
              VITE_API_URL: process.env.VITE_API_URL || '',
            };
            const script = '<script>\nwindow.__ENV__ = ' + JSON.stringify(envVars, null, 2) + ';\n</script>';
            let html = fs.readFileSync(distIndexPath, 'utf-8');
            const idx = html.indexOf('<script');
            if (idx === -1) { console.error('No script tag found'); process.exit(1); }
            html = html.slice(0, idx) + script + '\n' + html.slice(idx);
            fs.writeFileSync(distIndexPath, html, 'utf-8');
            console.log('Environment injected');
            INJECT_EOF
            
            # Correction ici : On passe juste VITE_API_URL, les autres sont déjà connues par SSH !
            VITE_API_URL="https://assets.mfwa.org/api" node /tmp/inject-env.js
            echo "✅ Environment injected"

            echo "📦 Building backend..."
            cd "$REPO_PATH/server"
            npm ci --quiet
            npm run build --quiet
            echo "✅ Backend compiled"

            mkdir -p "$PROD_PATH"

            echo "🛑 Clearing old PM2 process..."
            pm2 delete assets-tool --silent || true
            sleep 1

            echo "📤 Deploying files..."
            rm -rf "$PROD_PATH/dist" "$PROD_PATH/public" "$PROD_PATH/node_modules" "$PROD_PATH/logs"
            mkdir -p "$PROD_PATH/logs"
            cp -r "$REPO_PATH/server/dist" "$PROD_PATH/dist"
            cp "$REPO_PATH/server/package.json" "$PROD_PATH/package.json"
            cp "$REPO_PATH/server/package-lock.json" "$PROD_PATH/package-lock.json"
            mkdir -p "$PROD_PATH/public"
            cp -r "$REPO_PATH/client/dist"/* "$PROD_PATH/public/"
            echo "✅ Files deployed"

            echo "🔧 Writing .htaccess..."
            printf 'RewriteEngine On\nRewriteRule ^(.*)$ http://127.0.0.1:3003/$1 [P,L]\n' > "$PROD_PATH/.htaccess"
            echo "✅ .htaccess written"

            echo "📦 Installing dependencies..."
            cd "$PROD_PATH"
            npm install --omit=dev --quiet
            echo "✅ Dependencies installed"

            echo "🚀 Starting PM2..."
            DOTENV_CONFIG_SILENT=true pm2 start "$PROD_PATH/dist/server.js" \
              --name "assets-tool" \
              --watch false \
              --max-memory-restart "500M" \
              --error "$PROD_PATH/logs/error.log" \
              --output "$PROD_PATH/logs/out.log" \
              --node-args="--require dotenv/config" \
              --update-env \
              --silent
            sleep 4
            pm2 save --silent
            echo "✅ PM2 started"

            echo "🔍 Validating..."
            ERRORS=0
            [ -d "$PROD_PATH/dist" ]              && echo "  ✅ dist"         || { echo "  ❌ dist missing";      ERRORS=$((ERRORS+1)); }
            [ -d "$PROD_PATH/public" ]             && echo "  ✅ public"        || { echo "  ❌ public missing";    ERRORS=$((ERRORS+1)); }
            [ -f "$PROD_PATH/.env" ]               && echo "  ✅ .env"          || { echo "  ❌ .env missing";      ERRORS=$((ERRORS+1)); }
            grep -q "window.__ENV__" "$PROD_PATH/public/index.html" \
            && echo "  ✅ __ENV__"       || { echo "  ❌ __ENV__ missing";   ERRORS=$((ERRORS+1)); }
            
            PM2_STATUS=$(pm2 jlist | node -e "
            const list = JSON.parse(fs.readFileSync(0, 'utf-8'));
            const app = list.find(p => p.name === 'assets-tool');
            if (!app) { console.log('missing'); process.exit(0); }
            console.log(app.pm2_env.status);
            ")
            
            if [ "$PM2_STATUS" = "online" ]; then
            echo "  ✅ PM2 online"
            else
            echo "  ❌ PM2 not online (Status actuel: $PM2_STATUS)"
            ERRORS=$((ERRORS+1))
            fi

            if [ $ERRORS -gt 0 ]; then
              echo "❌ Validation failed ($ERRORS errors)"
              exit 1
            fi
            echo "✅ All validations passed"
            echo "=== ✨ Deploy complete (commit: $COMMIT_HASH) ==="

      - name: Test health endpoint
        id: health_test
        run: |
          sleep 5
          for i in {1..5}; do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" https://assets.mfwa.org/api/health)
            if [ "$CODE" = "200" ]; then echo "✅ Health OK"; exit 0; fi
            echo "⏳ Attempt $i/5 (HTTP $CODE), retrying..."
            sleep 3
          done
          echo "❌ Health endpoint failed"; exit 1

      - name: Test frontend
        id: frontend_test
        run: |
          RESPONSE=$(curl -s https://assets.mfwa.org/)
          echo "$RESPONSE" | grep -q "window.__ENV__" && echo "✅ __ENV__ present" || { echo "❌ __ENV__ missing"; exit 1; }
          echo "$RESPONSE" | grep -q "Assets Management" && echo "✅ Title present" || { echo "❌ Title missing"; exit 1; }

      - name: Success notification
        if: success()
        run: |
          echo "✅ DEPLOYMENT SUCCESSFUL"
          echo "App: https://assets.mfwa.org"
          echo "Commit: ${{ github.sha }}"

      - name: Failure - Rollback
        if: failure()
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            PROD_PATH="/home/${{ secrets.SSH_USER }}/public_html/assets.mfwa.org"
            LATEST_BACKUP=$(ls -td /home/${{ secrets.SSH_USER }}/backups/assets-mfwa-* 2>/dev/null | head -1)
            if [ -n "$LATEST_BACKUP" ] && [ -d "$LATEST_BACKUP" ]; then
              echo "🔄 Rolling back to $LATEST_BACKUP"
              pm2 stop assets-tool --silent || true
              rm -rf "$PROD_PATH"
              cp -r "$LATEST_BACKUP" "$PROD_PATH"
              cd "$PROD_PATH"
              pm2 start dist/server.js --name assets-tool --node-args="--require dotenv/config" --silent
              sleep 2
              echo "✅ Rollback complete"
            else
              echo "⚠️ No backup found — prod preserved as-is"
            fi

      - name: Slack notification
        if: always() && vars.SLACK_WEBHOOK != ''
        uses: slackapi/slack-github-action@v1.24.0
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK }}
          payload: |
            {
              "text": "${{ job.status == 'success' && '✅ Deploy successful' || '❌ Deploy failed' }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*${{ job.status == 'success' && '✅ Assets Management' || '❌ Deploy Failed' }}*\n`${{ github.ref_name }}` → `${{ github.sha }}`"
                  }
                },
                {
                  "type": "actions",
                  "elements": [
                    { "type": "button", "text": { "type": "plain_text", "text": "View App" }, "url": "https://assets.mfwa.org" },
                    { "type": "button", "text": { "type": "plain_text", "text": "View Logs" }, "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" }
                  ]
                }
              ]
            }