name: Deploy to cPanel - Assets

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH with increased timeout
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          timeout: 300s
          command_timeout: 300s
          script: |
            set -e
            
            echo "🔄 Pulling latest code..."
            cd /home/dxtrmfwa/repositories/inventory-app
            git pull origin main

            echo "📦 Installing frontend dependencies..."
            cd /home/dxtrmfwa/repositories/inventory-app/client
            npm install --legacy-peer-deps

            echo "🔨 Building frontend..."
            npm run build

            echo "📂 Copying frontend build to production..."
            rm -rf /home/dxtrmfwa/public_html/assets.mfwa.org/dist
            cp -r dist /home/dxtrmfwa/public_html/assets.mfwa.org/

            echo "📂 Copying backend files to production..."
            cp /home/dxtrmfwa/repositories/inventory-app/server/app.js /home/dxtrmfwa/public_html/assets.mfwa.org/
            cp /home/dxtrmfwa/repositories/inventory-app/server/cron-auto-close.js /home/dxtrmfwa/public_html/assets.mfwa.org/
            cp /home/dxtrmfwa/repositories/inventory-app/server/inject-env.js /home/dxtrmfwa/public_html/assets.mfwa.org/
            cp -r /home/dxtrmfwa/repositories/inventory-app/server/routes /home/dxtrmfwa/public_html/assets.mfwa.org/
            cp -r /home/dxtrmfwa/repositories/inventory-app/server/services /home/dxtrmfwa/public_html/assets.mfwa.org/server/

            echo "📦 Installing backend dependencies..."
            cd /home/dxtrmfwa/public_html/assets.mfwa.org
            npm ci --omit=dev

            echo "🔄 Restarting PM2..."
            pm2 restart assets-mgt

            echo "✅ Deployment completed successfully!"

      - name: Notify deployment success
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ Deployment to assets.mfwa.org completed successfully!'
            })

      - name: Notify deployment failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '❌ Deployment to assets.mfwa.org failed! Check the workflow logs.'
            })