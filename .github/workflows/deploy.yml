name: Deploy to Production

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Deploy to cPanel
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          timeout: 600s
          command_timeout: 600s
          script: |
            set -e

            echo "=== 🚀 Starting deployment: assets-mfwa.org (assets-tool) ==="

            # ========== DÉFINITIONS ==========
            REPO_PATH="/home/${{ secrets.SSH_USER }}/repositories/inventory-app"
            PROD_PATH="/home/${{ secrets.SSH_USER }}/public_html/assets.mfwa.org"
            
            # ========== GIT PULL ==========
            echo "📥 Pulling latest code..."
            cd "$REPO_PATH"
            git pull origin main --quiet
            echo "✅ Git pulled successfully"

            # ========== FRONTEND BUILD ==========
            echo "🎨 Building frontend..."
            cd "$REPO_PATH/client"
            npm ci --quiet
            npm run build --quiet
            echo "✅ Frontend built"

            # ========== INJECT ENVIRONMENT VARIABLES INTO dist/index.html ==========
            echo "🔧 Injecting environment variables..."
            cat > /tmp/inject-env.js << 'INJECT_EOF'
            const fs = require('fs');
            const path = require('path');
            
            const distIndexPath = path.join('/home/${{ secrets.SSH_USER }}/repositories/inventory-app/client', 'dist', 'index.html');
            
            if (!fs.existsSync(distIndexPath)) {
              console.error('❌ dist/index.html not found');
              process.exit(1);
            }
            
            const envVars = {
              VITE_GOOGLE_CLIENT_ID: process.env.VITE_GOOGLE_CLIENT_ID || '',
              VITE_CLOUDINARY_CLOUD_NAME: process.env.VITE_CLOUDINARY_CLOUD_NAME || '',
              VITE_CLOUDINARY_UPLOAD_PRESET: process.env.VITE_CLOUDINARY_UPLOAD_PRESET || '',
              VITE_API_URL: process.env.VITE_API_URL || '',
            };
            
            const injectionScript = `<script>
            window.__ENV__ = ${JSON.stringify(envVars, null, 2)};
            console.log('✅ Environment injected:', window.__ENV__);
            </script>`;
            
            let html = fs.readFileSync(distIndexPath, 'utf-8');
            const scriptIndex = html.indexOf('<script');
            
            if (scriptIndex === -1) {
              console.error('❌ No <script> tag found');
              process.exit(1);
            }
            
            html = html.slice(0, scriptIndex) + injectionScript + '\n' + html.slice(scriptIndex);
            fs.writeFileSync(distIndexPath, html, 'utf-8');
            console.log('✅ Environment injected into dist/index.html');
            INJECT_EOF
            
            VITE_GOOGLE_CLIENT_ID="${{ secrets.VITE_GOOGLE_CLIENT_ID }}" \
            VITE_CLOUDINARY_CLOUD_NAME="${{ secrets.VITE_CLOUDINARY_CLOUD_NAME }}" \
            VITE_CLOUDINARY_UPLOAD_PRESET="${{ secrets.VITE_CLOUDINARY_UPLOAD_PRESET }}" \
            VITE_API_URL="https://assets.mfwa.org/api" \
            node /tmp/inject-env.js

            # ========== BACKEND BUILD ==========
            echo "📦 Building backend..."
            cd "$REPO_PATH/server"
            npm ci --quiet
            npm run build --quiet
            echo "✅ Backend compiled"

            # ========== CLEANUP PROD (PHASE 1: REMOVE OLD) ==========
            echo "🧹 Cleaning production directory..."
            
            # Stop PM2 process if exists
            if pm2 list | grep -q "assets-tool"; then
              echo "  🛑 Stopping assets-tool..."
              pm2 stop assets-tool --silent || true
            fi
            
            # Remove old process from PM2
            if pm2 list | grep -q "assets-tool"; then
              echo "  🗑️ Removing assets-tool from PM2..."
              pm2 delete assets-tool --silent || true
            fi
            
            # Clean directories
            echo "  📁 Removing old dist, public, node_modules..."
            rm -rf "$PROD_PATH/dist"
            rm -rf "$PROD_PATH/public"
            rm -rf "$PROD_PATH/node_modules"
            rm -rf "$PROD_PATH/logs"
            
            echo "✅ Production cleaned"

            # ========== DEPLOY BACKEND ==========
            echo "📤 Deploying backend files..."
            mkdir -p "$PROD_PATH"
            mkdir -p "$PROD_PATH/logs"
            
            cp -r "$REPO_PATH/server/dist" "$PROD_PATH/dist"
            cp "$REPO_PATH/server/package.json" "$PROD_PATH/package.json"
            cp "$REPO_PATH/server/package-lock.json" "$PROD_PATH/package-lock.json"
            
            # NOTE: .env is PRESERVED from production (not overwritten)
            # Production secrets are managed separately:
            # GMAIL_USER=yves.cri@gmail.com
            # GMAIL_APP_PASSWORD=tttq work ktww cfok
            # (Manually updated on prod server)
            #
            # If you need to update .env from repo in future:
            # Uncomment the lines below and update server/.env.production
            # if [ -f "$REPO_PATH/server/.env.production" ]; then
            #   cp "$REPO_PATH/server/.env.production" "$PROD_PATH/.env"
            #   echo "✅ .env.production copied"
            # fi
            echo "ℹ️  .env preserved from production (not overwritten)"
            
            echo "✅ Backend deployed"

            # ========== DEPLOY FRONTEND ==========
            echo "📤 Deploying frontend files..."
            mkdir -p "$PROD_PATH/public"
            cp -r "$REPO_PATH/client/dist"/* "$PROD_PATH/public/"
            echo "✅ Frontend deployed to /public"

            # ========== INSTALL DEPENDENCIES ==========
            echo "📦 Installing dependencies..."
            cd "$PROD_PATH"
            npm install --omit=dev --quiet
            echo "✅ Dependencies installed"

            # ========== PM2 START (ASSETS-TOOL) ==========
            echo "🚀 Starting PM2 process (assets-tool)..."
            pm2 start "$PROD_PATH/dist/server.js" \
              --name "assets-tool" \
              --env "$PROD_PATH/.env" \
              --watch false \
              --max-memory-restart "500M" \
              --error "$PROD_PATH/logs/error.log" \
              --output "$PROD_PATH/logs/out.log" \
              --silent
            
            sleep 2
            pm2 save --silent
            echo "✅ PM2 process started and saved"

            # ========== VALIDATION ==========
            echo "🔍 Validating deployment..."
            
            # Check directories
            [ -d "$PROD_PATH/dist" ] && echo "  ✅ Backend dist exists" || echo "  ❌ Backend dist missing"
            [ -d "$PROD_PATH/public" ] && echo "  ✅ Frontend build exists" || echo "  ❌ Frontend build missing"
            [ -f "$PROD_PATH/package.json" ] && echo "  ✅ package.json exists" || echo "  ❌ package.json missing"
            [ -f "$PROD_PATH/.env" ] && echo "  ✅ .env exists" || echo "  ❌ .env missing"
            [ -f "$PROD_PATH/public/index.html" ] && grep -q "window.__ENV__" "$PROD_PATH/public/index.html" && echo "  ✅ Environment variables injected" || echo "  ❌ Environment variables NOT injected"
            
            # Check PM2 status
            echo "📊 PM2 Status:"
            pm2 list | grep -E "assets-tool|Name" || echo "  ⚠️ assets-tool not found"
            
            # Check logs for startup errors
            echo "📋 Recent logs:"
            [ -f "$PROD_PATH/logs/error.log" ] && tail -5 "$PROD_PATH/logs/error.log" || echo "  (no error logs yet)"

            echo "=== ✨ Deployment complete ==="