name: Deploy to cPanel - Assets

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            cd /home/dxtrmfwa/repositories/inventory-app
            git pull origin main

            echo "📦 Installing frontend dependencies..."
            npm install --legacy-peer-deps

            echo "🔨 Building frontend..."
            npm run build

            echo "📂 Copying frontend build to production..."
            rm -rf /home/dxtrmfwa/public_html/assets.mfwa.org/dist
            cp -r dist /home/dxtrmfwa/public_html/assets.mfwa.org/

            echo "📦 Installing backend dependencies..."
            cd /home/dxtrmfwa/public_html/assets.mfwa.org
            npm ci --omit=dev

            echo "🔄 Restarting PM2..."
            pm2 restart assets-mgt

            echo "✅ Deployment complete!"