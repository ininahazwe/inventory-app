name: Deploy to Production

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Deploy to cPanel
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            echo "=== 🚀 Starting deployment: inventory-app ==="

            # ========== GIT PULL ==========
            cd /home/${{ secrets.SSH_USER }}/repositories/inventory-app
            git pull origin main --quiet
            echo "✅ Git pulled successfully"

            # ========== FRONTEND BUILD ==========
            echo "🎨 Building frontend..."
            cd /home/${{ secrets.SSH_USER }}/repositories/inventory-app/client
            npm ci --quiet
            npm run build --quiet
            echo "✅ Frontend built"

            # ========== INJECT ENVIRONMENT VARIABLES INTO dist/index.html ==========
            echo "🔧 Injecting environment variables..."
            cat > /tmp/inject-env.js << 'INJECT_EOF'
            const fs = require('fs');
            const path = require('path');
            
            const distIndexPath = path.join('/home/${{ secrets.SSH_USER }}/repositories/inventory-app/client', 'dist', 'index.html');
            
            if (!fs.existsSync(distIndexPath)) {
              console.error('❌ dist/index.html not found');
              process.exit(1);
            }
            
            const envVars = {
              VITE_GOOGLE_CLIENT_ID: process.env.VITE_GOOGLE_CLIENT_ID || '',
              VITE_CLOUDINARY_CLOUD_NAME: process.env.VITE_CLOUDINARY_CLOUD_NAME || '',
              VITE_CLOUDINARY_UPLOAD_PRESET: process.env.VITE_CLOUDINARY_UPLOAD_PRESET || '',
              VITE_API_URL: process.env.VITE_API_URL || '',
            };
            
            const injectionScript = `<script>
            window.__ENV__ = ${JSON.stringify(envVars, null, 2)};
            console.log('✅ Environment injected:', window.__ENV__);
            </script>`;
            
            let html = fs.readFileSync(distIndexPath, 'utf-8');
            const scriptIndex = html.indexOf('<script');
            
            if (scriptIndex === -1) {
              console.error('❌ No <script> tag found');
              process.exit(1);
            }
            
            html = html.slice(0, scriptIndex) + injectionScript + '\n' + html.slice(scriptIndex);
            fs.writeFileSync(distIndexPath, html, 'utf-8');
            console.log('✅ Environment injected into dist/index.html');
            INJECT_EOF
            
            export VITE_GOOGLE_CLIENT_ID="${{ secrets.VITE_GOOGLE_CLIENT_ID }}"
            export VITE_CLOUDINARY_CLOUD_NAME="${{ secrets.VITE_CLOUDINARY_CLOUD_NAME }}"
            export VITE_CLOUDINARY_UPLOAD_PRESET="${{ secrets.VITE_CLOUDINARY_UPLOAD_PRESET }}"
            export VITE_API_URL="https://assets.mfwa.org/api"
            
            node /tmp/inject-env.js

            # ========== BACKEND DEPLOYMENT (TypeScript/Express) ==========
            echo "📦 Building & deploying backend..."
            
            # Build TypeScript
            cd /home/${{ secrets.SSH_USER }}/repositories/inventory-app/server
            npm ci --quiet
            npm run build --quiet
            echo "✅ Backend compiled"

            # Copy compiled dist to production
            rm -rf /home/${{ secrets.SSH_USER }}/public_html/assets.mfwa.org/dist
            mkdir -p /home/${{ secrets.SSH_USER }}/public_html/assets.mfwa.org/dist
            cp -r /home/${{ secrets.SSH_USER }}/repositories/inventory-app/server/dist/* /home/${{ secrets.SSH_USER }}/public_html/assets.mfwa.org/dist/
            
            # Copy package files
            cp /home/${{ secrets.SSH_USER }}/repositories/inventory-app/server/package.json /home/${{ secrets.SSH_USER }}/public_html/assets.mfwa.org/package.json
            cp /home/${{ secrets.SSH_USER }}/repositories/inventory-app/server/package-lock.json /home/${{ secrets.SSH_USER }}/public_html/assets.mfwa.org/package-lock.json
            
            # Copy .env production (if exists)
            if [ -f /home/${{ secrets.SSH_USER }}/repositories/inventory-app/server/.env.production ]; then
              cp /home/${{ secrets.SSH_USER }}/repositories/inventory-app/server/.env.production /home/${{ secrets.SSH_USER }}/public_html/assets.mfwa.org/.env
              echo "✅ .env copied"
            fi
            
            echo "✅ Backend files deployed"

            # ========== DEPLOY .HTACCESS ==========
            echo "📄 Deploying .htaccess..."
            cp /home/${{ secrets.SSH_USER }}/repositories/inventory-app/.htaccess /home/${{ secrets.SSH_USER }}/public_html/assets.mfwa.org/.htaccess
            echo "✅ .htaccess deployed"

            # ========== DEPLOY FRONTEND TO /public ==========
            echo "📁 Deploying frontend to /public..."
            rm -rf /home/${{ secrets.SSH_USER }}/public_html/assets.mfwa.org/public
            mkdir -p /home/${{ secrets.SSH_USER }}/public_html/assets.mfwa.org/public
            cp -r /home/${{ secrets.SSH_USER }}/repositories/inventory-app/client/dist/* /home/${{ secrets.SSH_USER }}/public_html/assets.mfwa.org/public/
            echo "✅ Frontend deployed to /public"

            # ========== INSTALL BACKEND DEPENDENCIES ==========
            echo "📦 Installing backend dependencies..."
            cd /home/${{ secrets.SSH_USER }}/public_html/assets.mfwa.org
            npm install --omit=dev --quiet
            echo "✅ Backend dependencies installed"

            # ========== PM2 RESTART ==========
            echo "🔄 Restarting PM2 process..."
            pm2 restart assets-mgt --silent
            sleep 2
            echo "✅ PM2 process restarted"

            # ========== FINAL VALIDATION ==========
            echo "🔍 Validating deployment..."
            [ -d /home/${{ secrets.SSH_USER }}/public_html/assets.mfwa.org/dist ] && echo "✅ Backend dist exists" || echo "❌ Backend dist missing"
            [ -f /home/${{ secrets.SSH_USER }}/public_html/assets.mfwa.org/package.json ] && echo "✅ package.json exists" || echo "❌ package.json missing"
            [ -d /home/${{ secrets.SSH_USER }}/public_html/assets.mfwa.org/public ] && echo "✅ Frontend build exists" || echo "❌ Frontend build missing"
            [ -f /home/${{ secrets.SSH_USER }}/public_html/assets.mfwa.org/public/index.html ] && grep -q "window.__ENV__" /home/${{ secrets.SSH_USER }}/public_html/assets.mfwa.org/public/index.html && echo "✅ Environment variables injected" || echo "❌ Environment variables NOT injected"

            # Vérifier le statut PM2
            echo "📊 PM2 Status:"
            pm2 status | grep assets-mgt || echo "⚠️ assets-mgt process not found"

            echo "=== ✨ Deployment complete ==="