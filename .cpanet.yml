---
deployment:
  tasks:
    # Variables d'environnement
    - export DEPLOYPATH=/home/dxtrmfwa/repositories/inventory-app
    - export PROD=/home/dxtrmfwa/public_html/assets.mfwa.org

    # Copier .env prod dans le repo avant build
    - cp $PROD/.env $DEPLOYPATH/.env

    # Install dépendances frontend
    - cd $DEPLOYPATH && npm install --legacy-peer-deps

    # Build frontend
    - cd $DEPLOYPATH && npm run build

    # Copier la build frontend vers prod
    - rm -rf $PROD/dist
    - cp -r $DEPLOYPATH/dist $PROD/dist

    # Install dépendances backend (production only)
    - cd $PROD && npm install --omit=dev --legacy-peer-deps

    # Redémarrer PM2
    - pm2 restart assets-mgt